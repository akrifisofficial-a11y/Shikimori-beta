<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container header-inner">
      <h1>Админ-панель</h1>
      <a href="index.html" class="btn-admin">На сайт</a>
    </div>
  </header>

  <main class="container">
    <section class="admin-section">
      <h2>➕ Добавить аниме</h2>
      <input type="text" id="title" placeholder="Название">
      <input type="text" id="shiki_id" placeholder="Shikimori ID">
      <input type="text" id="cover" placeholder="Ссылка на обложку">
      <input type="text" id="genres" placeholder="Жанры через запятую">
      <textarea id="description" placeholder="Описание"></textarea>
      <button id="save-anime" class="btn">Сохранить</button>
    </section>

    <section class="admin-section">
      <h2>🎬 Добавить серии</h2>
      <select id="anime-select"></select>
      <textarea id="ep-links" placeholder="Формат: номер | название | ссылка&#10;1 | Серия 1 | https://...&#10;2 | Серия 2 | https://..." rows="6"></textarea>
      <small style="color: var(--text-muted);">Если ссылки нет - оставь поле пустым. Ссылка пока не используется, но сохранится.</small>
      <button id="save-episodes" class="btn">Добавить серии</button>
    </section>

    <section class="admin-section">
      <h2>📋 Все аниме</h2>
      <div id="anime-edit-list"></div>
    </section>
  </main>

  <!-- Модалка редактирования -->
  <div id="edit-modal" class="modal">
    <div class="modal-content">
      <span id="close-edit" class="close">&times;</span>
      <h2>Редактировать аниме</h2>
      <input type="text" id="edit-title" placeholder="Название">
      <input type="text" id="edit-shiki_id" placeholder="Shikimori ID">
      <input type="text" id="edit-cover" placeholder="Ссылка на обложку">
      <input type="text" id="edit-genres" placeholder="Жанры через запятую">
      <textarea id="edit-description" placeholder="Описание"></textarea>
      <button id="update-anime" class="btn">Сохранить изменения</button>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
        </html>
