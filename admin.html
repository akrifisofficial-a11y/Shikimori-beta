<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка - Anime Site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container header-inner">
      <h1>Админ-панель</h1>
      <a href="/" class="btn-admin">На сайт</a>
      <button id="logout-btn" class="btn btn-danger">Выйти</button>
    </div>
  </header>

  <main class="container">
    <section class="admin-section">
      <h2>➕ Добавить аниме</h2>
      
      <label style="display:block; margin-bottom:6px; font-size:14px; color:var(--text-muted);">
        Ссылка на Shikimori
      </label>
      <input type="text" id="shiki_url" placeholder="https://shikimori.io/animes/60427-gnosia/watch">
      
      <input type="text" id="shiki_id" placeholder="Shikimori ID" readonly style="background: var(--card-hover);">

      <div style="display: flex; gap: 12px; margin: 16px 0;">
        <button type="button" id="auto-fill-episodes" class="btn">Загрузить данные и серии</button>
      </div>

      <label style="display:block; margin-bottom:6px; font-size:14px; color:var(--text-muted);">
        Название
      </label>
      <input type="text" id="title" placeholder="Jujutsu Kaisen">

      <label style="display:block; margin-bottom:6px; font-size:14px; color:var(--text-muted);">
        Обложка
      </label>
      <input type="text" id="cover" placeholder="https://shikimori.one/system/animes/original/50801.jpg">

      <label style="display:block; margin-bottom:6px; font-size:14px; color:var(--text-muted);">
        Жанры через запятую
      </label>
      <input type="text" id="genres" placeholder="Экшен, Сверхъестественное, Школа">

      <label style="display:block; margin-bottom:6px; font-size:14px; color:var(--text-muted);">
        Описание
      </label>
      <textarea id="description" placeholder="Описание аниме"></textarea>

      <button id="save-anime" class="btn" style="margin-top: 16px;">Сохранить аниме</button>
    </section>

    <section class="admin-section">
      <h2>🎬 Добавить серии</h2>
      
      <label style="display:block; margin-bottom:6px; font-size:14px; color:var(--text-muted);">
        Выбери аниме
      </label>
      <select id="anime-select"></select>

      <div id="episodes-form" style="margin-top: 20px;"></div>
      
      <div class="episode-actions">
        <button type="button" id="add-episode-row" class="btn">+ Добавить серию</button>
        <button id="save-episodes" class="btn">Сохранить серии</button>
      </div>
    </section>

    <section class="admin-section">
      <h2>📋 Все аниме</h2>
      <div id="anime-edit-list"></div>
    </section>
  </main>

  <div id="edit-modal" class="modal">
    <div class="modal-content">
      <span id="close-edit" class="close">&times;</span>
      <h2>Редактировать аниме</h2>
      
      <label style="display:block; margin-bottom:6px; font-size:14px; color:var(--text-muted);">Название</label>
      <input type="text" id="edit-title" placeholder="Название">
      
      <label style="display:block; margin-bottom:6px; font-size:14px; color:var(--text-muted);">Shikimori ID</label>
      <input type="text" id="edit-shiki_id" placeholder="Shikimori ID">
      
      <label style="display:block; margin-bottom:6px; font-size:14px; color:var(--text-muted);">Обложка</label>
      <input type="text" id="edit-cover" placeholder="Ссылка на обложку">
      
      <label style="display:block; margin-bottom:6px; font-size:14px; color:var(--text-muted);">Жанры</label>
      <input type="text" id="edit-genres" placeholder="Жанры через запятую">
      
      <label style="display:block; margin-bottom:6px; font-size:14px; color:var(--text-muted);">Описание</label>
      <textarea id="edit-description" placeholder="Описание"></textarea>
      
      <button id="update-anime" class="btn">Сохранить изменения</button>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
      </html>
