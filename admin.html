<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container header-inner">
      <h1>Админ-панель</h1>
      <a href="index.html" class="btn-admin">На сайт</a>
      <button id="logout-btn" class="btn btn-danger">Выйти</button>
    </div>
  </header>

  <main class="container">
    <section class="admin-section">
      <h2>➕ Добавить аниме</h2>
      <input type="text" id="title" placeholder="Название">
      <input type="text" id="shiki_id" placeholder="Shikimori ID">
      <input type="text" id="cover" placeholder="Ссылка на обложку">
      <input type="text" id="genres" placeholder="Жанры через запятую">
      <textarea id="description" placeholder="Описание"></textarea>
      <button id="save-anime" class="btn">Сохранить</button>
    </section>

    <section class="admin-section">
      <h2>🎬 Добавить серии</h2>
      <select id="anime-select"></select>
      <div id="episodes-form">
        <div class="episode-row">
          <input type="number" class="ep-num" placeholder="№" min="1">
          <input type="text" class="ep-title" placeholder="Название серии">
          <input type="text" class="ep-link" placeholder="Ссылка на видео">
          <button type="button" class="btn btn-danger remove-ep">×</button>
        </div>
      </div>
      <div class="episode-actions">
        <button type="button" id="add-episode-row" class="btn">+ Добавить поле</button>
        <button id="save-episodes" class="btn">Сохранить серии</button>
      </div>
    </section>

    <section class="admin-section">
      <h2>📋 Все аниме</h2>
      <div id="anime-edit-list"></div>
    </section>
  </main>

  <div id="edit-modal" class="modal">
    <div class="modal-content">
      <span id="close-edit" class="close">&times;</span>
      <h2>Редактировать аниме</h2>
      <input type="text" id="edit-title" placeholder="Название">
      <input type="text" id="edit-shiki_id" placeholder="Shikimori ID">
      <input type="text" id="edit-cover" placeholder="Ссылка на обложку">
      <input type="text" id="edit-genres" placeholder="Жанры через запятую">
      <textarea id="edit-description" placeholder="Описание"></textarea>
      <button id="update-anime" class="btn">Сохранить изменения</button>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
